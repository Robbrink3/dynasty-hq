<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Dynasty HQ">
<title>Dynasty HQ</title>
<style>
:root{
  --bg:#0f0f14;--card:#1a1a24;--border:#2a2a38;--acc:#6c63ff;
  --acc2:#00d4aa;--danger:#ff4757;--warn:#ffa502;--ok:#2ed573;
  --txt:#e8e8f0;--sub:#8888aa;--tab-h:56px;--safe:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',sans-serif;
  min-height:100dvh;overflow-x:hidden}
#app{display:flex;flex-direction:column;height:100dvh}
#nav{display:flex;background:#12121a;border-top:1px solid var(--border);
  padding-bottom:var(--safe);height:calc(var(--tab-h) + var(--safe));
  position:fixed;bottom:0;left:0;right:0;z-index:100}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:2px;font-size:9px;font-weight:600;color:var(--sub);cursor:pointer;
  letter-spacing:.5px;text-transform:uppercase;transition:color .2s;border:none;background:none}
.tab.on{color:var(--acc)}
.tab svg{width:20px;height:20px}
#pages{flex:1;overflow:hidden;position:relative;margin-bottom:calc(var(--tab-h) + var(--safe))}
.pg{display:none;height:100%;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px 14px 24px}
.pg.on{display:block}
h1{font-size:22px;font-weight:700;margin-bottom:4px}
.subtitle{color:var(--sub);font-size:12px;margin-bottom:16px}
.sec{background:var(--card);border:1px solid var(--border);border-radius:14px;margin-bottom:14px;overflow:hidden}
.sec-hd{display:flex;align-items:center;justify-content:space-between;
  padding:12px 14px;border-bottom:1px solid var(--border);cursor:pointer;position:relative}
.sec-hd h2{font-size:13px;font-weight:700;letter-spacing:.3px;text-transform:uppercase;color:var(--acc)}
.tip-icon{font-size:11px;color:var(--sub);margin-left:6px;opacity:.7}
.tooltip{display:none;position:absolute;top:calc(100% + 6px);left:8px;right:8px;
  background:#23233a;border:1px solid var(--border);border-radius:10px;
  padding:10px 12px;font-size:12px;color:var(--txt);z-index:200;
  line-height:1.5;box-shadow:0 8px 24px rgba(0,0,0,.5)}
.sec-hd.tip-open .tooltip{display:block}
.p-row{display:flex;align-items:center;padding:10px 14px;border-bottom:1px solid var(--border)}
.p-row:last-child{border-bottom:none}
.pos-badge{font-size:9px;font-weight:800;padding:2px 5px;border-radius:5px;
  min-width:28px;text-align:center;margin-right:8px;letter-spacing:.3px}
.pos-QB{background:#1a2a4a;color:#60a0ff}
.pos-RB{background:#1a3a2a;color:#40d080}
.pos-WR{background:#3a2a1a;color:#ffaa40}
.pos-TE{background:#3a1a3a;color:#e060ff}
.pos-DST{background:#2a2a1a;color:#d4d040}
.pos-FLEX{background:#2a1a2a;color:#c0a0e0}
.pos-SFLEX{background:#1a2a3a;color:#60c0e0}
.p-name{flex:1;font-size:14px;font-weight:600}
.p-meta{font-size:11px;color:var(--sub);margin-top:1px}
.p-pts{font-size:13px;font-weight:700;color:var(--acc2);min-width:40px;text-align:right}
.p-note{font-size:11px;color:var(--warn);margin-top:2px}
.badge{display:inline-block;font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;margin-left:6px}
.badge-start{background:#1a3a1a;color:var(--ok)}
.badge-bench{background:#2a2a1a;color:var(--sub)}
.badge-taxi{background:#2a1a1a;color:var(--danger)}
.total-row{display:flex;justify-content:space-between;align-items:center;
  padding:12px 14px;background:#12121a;border-top:2px solid var(--border)}
.total-label{font-size:12px;color:var(--sub);font-weight:600;text-transform:uppercase}
.total-pts{font-size:20px;font-weight:800;color:var(--acc2)}
.slot-card{padding:12px 14px;border-bottom:1px solid var(--border)}
.slot-card:last-child{border-bottom:none}
.chip{display:inline-block;font-size:11px;font-weight:700;padding:3px 8px;
  border-radius:20px;margin:2px 3px 2px 0}
.chip-avail{background:#1a2a1a;color:var(--ok);border:1px solid #2a4a2a}
.chip-used{background:#1a1a2a;color:var(--sub);border:1px solid #2a2a3a}
.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 18px;
  border-radius:12px;font-size:13px;font-weight:700;border:none;cursor:pointer;transition:all .2s}
.btn-primary{background:var(--acc);color:#fff}
textarea,select,input[type=text]{width:100%;background:#12121a;color:var(--txt);
  border:1px solid var(--border);border-radius:10px;padding:10px 12px;
  font-size:13px;font-family:inherit;resize:none;outline:none}
textarea:focus,select:focus,input[type=text]:focus{border-color:var(--acc)}
.trade-section{padding:14px}
.trade-row{display:flex;gap:8px;margin-bottom:10px;align-items:flex-start}
.trade-col{flex:1}
.trade-col label{font-size:11px;color:var(--sub);font-weight:600;text-transform:uppercase;letter-spacing:.3px;display:block;margin-bottom:4px}
.analysis{background:#12121a;border-radius:10px;padding:12px 14px;margin:10px 14px;font-size:13px;line-height:1.6}
.verdict{font-size:16px;font-weight:800;margin-bottom:6px}
.verdict-ok{color:var(--ok)}
.verdict-no{color:var(--danger)}
.verdict-maybe{color:var(--warn)}
.inner-tabs{display:flex;gap:0;background:#12121a;border-radius:10px;padding:3px;margin-bottom:14px}
.inner-tab{flex:1;padding:8px;text-align:center;font-size:12px;font-weight:700;
  border-radius:8px;cursor:pointer;color:var(--sub);border:none;background:none;transition:all .2s}
.inner-tab.on{background:var(--card);color:var(--txt)}
.rank{font-size:11px;font-weight:800;color:var(--sub);min-width:20px;margin-right:6px}
.need-badge{font-size:10px;font-weight:700;padding:2px 6px;border-radius:5px;margin-left:4px}
.need-high{background:#3a1a1a;color:var(--danger)}
.need-mid{background:#3a2a1a;color:var(--warn)}
.need-low{background:#1a2a1a;color:var(--ok)}
.ask-wrap{display:flex;flex-direction:column;height:calc(100dvh - var(--tab-h) - var(--safe) - 80px)}
.ask-msgs{flex:1;overflow-y:auto;padding-bottom:12px}
.msg{margin-bottom:14px;animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.msg-u{display:flex;justify-content:flex-end}
.msg-u .bubble{background:var(--acc);color:#fff;border-radius:18px 18px 4px 18px;max-width:80%;padding:10px 14px;font-size:14px;line-height:1.5}
.msg-a .bubble{background:var(--card);border:1px solid var(--border);border-radius:18px 18px 18px 4px;max-width:92%;padding:12px 14px;font-size:14px;line-height:1.6}
.msg-a .bubble a{color:var(--acc2);text-decoration:none}
.ask-bar{display:flex;gap:8px;padding:10px 0 0}
.ask-bar input{flex:1;background:#1a1a24;border:1px solid var(--border);border-radius:24px;padding:11px 16px;font-size:14px;color:var(--txt);outline:none}
.ask-bar input:focus{border-color:var(--acc)}
.ask-bar button{background:var(--acc);border:none;border-radius:50%;width:42px;height:42px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
.quick-qs{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
.qq{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:6px 12px;font-size:12px;font-weight:600;color:var(--acc2);cursor:pointer}
.loading{display:flex;align-items:center;gap:8px;color:var(--sub);font-size:13px;padding:8px 0}
.dot{width:6px;height:6px;border-radius:50%;background:var(--acc);animation:blink 1.2s infinite}
.dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,80%,100%{opacity:.2}40%{opacity:1}}
</style>
</head>
<body>
<div id="app">
<div id="pages">
  <div class="pg on" id="pg-roster">
    <h1>Roster</h1><p class="subtitle">Optimal starting lineup · PPR scoring</p>
    <div id="roster-body"></div>
  </div>
  <div class="pg" id="pg-contracts">
    <h1>Contracts</h1><p class="subtitle">2026 season · manage your slots</p>
    <div id="contracts-body"></div>
  </div>
  <div class="pg" id="pg-week">
    <h1>This Week</h1><p class="subtitle">Full roster · start/sit recommendations</p>
    <div id="week-body"></div>
  </div>
  <div class="pg" id="pg-draft">
    <h1>Draft / Waiver</h1><p class="subtitle">Free agents ranked by team need</p>
    <div id="draft-body"></div>
  </div>
  <div class="pg" id="pg-trade">
    <h1>Trade</h1><p class="subtitle">Analyze deals — incoming or outgoing</p>
    <div id="trade-body"></div>
  </div>
  <div class="pg" id="pg-ask">
    <h1>Ask</h1><p class="subtitle">Chat about your team, strategy, rules</p>
    <div id="ask-body"></div>
  </div>
</div>
<nav id="nav">
  <button class="tab on" id="t-roster" onclick="go('roster')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>Roster
  </button>
  <button class="tab" id="t-contracts" onclick="go('contracts')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="3" width="16" height="18" rx="2"/><path d="M8 7h8M8 11h8M8 15h5"/></svg>Contracts
  </button>
  <button class="tab" id="t-week" onclick="go('week')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>Week
  </button>
  <button class="tab" id="t-draft" onclick="go('draft')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12l7-7 7 7"/></svg>Draft
  </button>
  <button class="tab" id="t-trade" onclick="go('trade')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 16l-4-4 4-4M17 8l4 4-4 4M14 4l-4 16"/></svg>Trade
  </button>
  <button class="tab" id="t-ask" onclick="go('ask')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>Ask
  </button>
</nav>
</div>

<script>
// ── SEED DATA ────────────────────────────────────────────────────────────────
const SEED={
  active:[
    {name:'Rashee Rice',    pos:'WR',years:3,expiry:2028,taxi:false},
    {name:'Joe Burrow',     pos:'QB',years:1,expiry:2026,taxi:false},
    {name:'Devonta Smith',  pos:'WR',years:1,expiry:2026,taxi:false},
    {name:'Isiah Pacheco',  pos:'RB',years:1,expiry:2026,taxi:false},
    {name:'Jaylin Noel',    pos:'WR',years:1,expiry:2026,taxi:true},
    {name:'Terry McLaurin', pos:'WR',years:1,expiry:2026,taxi:false},
    {name:'Chris Bell',     pos:'WR',years:1,expiry:2026,taxi:false},
    {name:'Desmond Reid',   pos:'RB',years:1,expiry:2026,taxi:false},
    {name:'Skyler Bell',    pos:'WR',years:1,expiry:2026,taxi:false},
    {name:'Kaytron Allen',  pos:'RB',years:1,expiry:2026,taxi:false},
    {name:'Kaelon Black',   pos:'RB',years:1,expiry:2026,taxi:false},
    {name:'Drew Allar',     pos:'QB',years:1,expiry:2026,taxi:false},
    {name:'Isaac Tesla',    pos:'WR',years:1,expiry:2026,taxi:true},
  ],
  needs:[
    {name:'Christian Watson',pos:'WR'},{name:'David Njoku',pos:'TE'},
    {name:'Cam Ward',pos:'QB'},{name:'Kaleb Johnson',pos:'RB'},
    {name:'Tre Harris',pos:'WR'},{name:'Rashid Shaheed',pos:'WR'},
    {name:'Tucker Kraft',pos:'TE'},{name:'Juwan Johnson',pos:'TE'},
    {name:'Theo Johnson',pos:'TE'},{name:'Darius Slayton',pos:'WR'},
    {name:'Kendrick Bourne',pos:'WR'},{name:'Keenan Allen',pos:'WR'},
    {name:'Tre Tucker',pos:'WR'},{name:'Devin Singletary',pos:'RB'},
    {name:'Dallas Cowboys',pos:'DST'},{name:'Cade Otton',pos:'TE'},
    {name:'Parker Washington',pos:'WR'},{name:'Tyler Algier',pos:'RB'},
  ],
  inventory:{'4yr':1,'3yr':1,'2yr':3,'1yr':1,'xfer':1},
  allocations:{},
  deadline:'2026-06-29'
};

// ── DYNASTY VALUES ───────────────────────────────────────────────────────────
const DV={
  'Joe Burrow':8800,'Rashee Rice':8600,'Devonta Smith':6800,
  'Isiah Pacheco':6200,'Terry McLaurin':5800,'Jaylin Noel':5400,
  'Kaytron Allen':6000,'Kaelon Black':4800,'Drew Allar':5000,
  'Desmond Reid':4500,'Skyler Bell':4000,'Chris Bell':3800,'Isaac Tesla':4200,
  'David Njoku':5500,'Tucker Kraft':5800,'Cam Ward':7200,'Kaleb Johnson':6500,
  'Tre Harris':6200,'Rashid Shaheed':5200,'Tyler Algier':4500,
  'Devin Singletary':3500,'Dallas Cowboys':2800,'Parker Washington':4600,
  'Juwan Johnson':3800,'Theo Johnson':4200,'Cade Otton':4500,
  'Kendrick Bourne':3200,'Keenan Allen':3800,'Darius Slayton':3500,
  'Tre Tucker':3800,'Christian Watson':5000,
  '2025 1st':7000,'2026 1st':6500,'2027 1st':6000,
  '2025 2nd':4500,'2026 2nd':4000,'2027 2nd':3500,
};

// ── PPR PROJECTIONS (weekly avg) ─────────────────────────────────────────────
const PROJ={
  'Joe Burrow':24.8,'Rashee Rice':18.2,'Devonta Smith':15.4,
  'Isiah Pacheco':14.6,'Terry McLaurin':13.8,'Jaylin Noel':9.2,
  'Kaytron Allen':10.4,'Kaelon Black':8.8,'Drew Allar':12.0,
  'Desmond Reid':8.2,'Skyler Bell':6.8,'Chris Bell':5.4,'Isaac Tesla':6.2,
  'David Njoku':11.2,'Tucker Kraft':9.8,'Cam Ward':16.5,'Kaleb Johnson':12.8,
  'Tre Harris':11.4,'Rashid Shaheed':10.2,'Tyler Algier':8.6,
  'Devin Singletary':9.4,'Dallas Cowboys':8.8,'Parker Washington':9.0,
  'Juwan Johnson':6.8,'Theo Johnson':7.2,'Cade Otton':8.0,
  'Kendrick Bourne':5.8,'Keenan Allen':6.4,'Darius Slayton':7.2,
  'Tre Tucker':7.4,'Christian Watson':10.8,
};

// ── PLAYER NOTES ─────────────────────────────────────────────────────────────
const NOTES={
  'Joe Burrow':'Elite QB1. Bengals fully loaded in 2026. Lock him in.',
  'Rashee Rice':'Recovering from torn ACL. On track for full return. Top-5 WR talent — hold.',
  'Devonta Smith':'Solid WR2 in elite Philly offense. PPR darling with volume.',
  'Isiah Pacheco':'KC lead back. Pass-catcher upside. Proven in big moments.',
  'Terry McLaurin':'Reliable floor WR. New OC could unlock more targets in 2026.',
  'Jaylin Noel':'Promising rookie WR on taxi. Watch training camp battles.',
  'Kaytron Allen':'Rookie RB with three-down upside. Hold for 2+ years.',
  'Kaelon Black':'High variance RB. Limited touches as of now.',
  'Drew Allar':'Rookie QB. Big arm, strong upside — needs time to develop.',
  'Desmond Reid':'Flex RB. PPR value if pass-catching role expands.',
  'Skyler Bell':'Depth WR. Fringe roster spot — could be cut.',
  'Chris Bell':'Developmental WR. On the bubble for roster cuts.',
  'Isaac Tesla':'High-upside rookie WR on taxi. Worth holding 2-3 yrs.',
  'David Njoku':'Target hog TE. Great PPR value. Priority free agent add.',
  'Tucker Kraft':'Young ascending TE in GB offense. Hold long term.',
  'Cam Ward':'Top rookie QB this class. Landing spot TBD. Dynasty upside is massive.',
  'Kaleb Johnson':'First-round rookie RB. Workhorse profile. Should be your top add.',
  'Tre Harris':'Rookie WR1 candidate. Elite slot speed, yards after catch.',
  'Rashid Shaheed':'Speed demon. Big-play upside but limited target volume.',
  'Tyler Algier':'Complementary RB. Safe FLEX if starters are hurt.',
  'Devin Singletary':'Vet RB. Consistent but no ceiling.',
  'Dallas Cowboys':'Reliable DST. Solid scoring in standard formats.',
  'Parker Washington':'Developing WR in thin pool. Worth a look.',
  'Cade Otton':'Streaming TE. Tampa Bay target hog with upside.',
};

// ── POSITIONAL NEEDS ─────────────────────────────────────────────────────────
const TEAM_NEEDS=['TE','RB','QB','DST','WR'];

// ── STORAGE ──────────────────────────────────────────────────────────────────
function ldD(){try{var v=localStorage.getItem('dhq');return v?JSON.parse(v):JSON.parse(JSON.stringify(SEED))}catch(e){return JSON.parse(JSON.stringify(SEED))}}
function svD(d){try{localStorage.setItem('dhq',JSON.stringify(d))}catch(e){}}
function ldCfg(){try{var v=localStorage.getItem('dhq-cfg');return v?JSON.parse(v):{}}catch(e){return{}}}
function svCfg(c){try{localStorage.setItem('dhq-cfg',JSON.stringify(c))}catch(e){}}

var D=ldD();

// ── HELPERS ──────────────────────────────────────────────────────────────────
function dv(n){return DV[n]||4000;}
function proj(n){return PROJ[n]||7.0;}
function note(n){return NOTES[n]||'';}
function curYr(){return new Date().getFullYear();}

function makeSec(title,tooltip,body){
  return '<div class="sec">' +
    '<div class="sec-hd" onclick="toggleTip(this)">' +
      '<h2>' + title + '<span class="tip-icon"> ⓘ</span></h2>' +
      '<div class="tooltip">' + tooltip + '</div>' +
    '</div>' +
    body +
  '</div>';
}

function toggleTip(el){el.classList.toggle('tip-open');}

function go(t){
  document.querySelectorAll('.pg').forEach(function(p){p.classList.remove('on');});
  document.querySelectorAll('.tab').forEach(function(b){b.classList.remove('on');});
  document.getElementById('pg-'+t).classList.add('on');
  document.getElementById('t-'+t).classList.add('on');
  D=ldD();
  if(t==='roster')renderRoster();
  if(t==='contracts')renderContracts();
  if(t==='week')renderWeek();
  if(t==='draft')renderDraft();
  if(t==='trade')renderTrade();
  if(t==='ask')renderAsk();
}

// ── LINEUP BUILDER (1QB 2RB 3WR 1TE 2FLEX 1SFLEX 1DST) ─────────────────────
function buildLineup(players){
  var pool=players.map(function(p){return Object.assign({},p,{pp:proj(p.name)});}).sort(function(a,b){return b.pp-a.pp;});
  var used={};
  function take(positions,n){
    var out=[];
    for(var i=0;i<pool.length&&out.length<n;i++){
      var p=pool[i];
      if(!used[p.name]&&positions.indexOf(p.pos)>-1){out.push(p);used[p.name]=true;}
    }
    return out;
  }
  var QBs=take(['QB'],1);
  var RBs=take(['RB'],2);
  var WRs=take(['WR'],3);
  var TEs=take(['TE'],1);
  var FLEXs=take(['RB','WR','TE'],2);
  var SFLEXs=take(['QB','WR','TE','RB'],1);
  var DSTs=take(['DST'],1);
  function tag(arr,slot){return arr.map(function(p){return Object.assign({},p,{slot:slot});});}
  var lineup=tag(QBs,'QB').concat(tag(RBs,'RB'),tag(WRs,'WR'),tag(TEs,'TE'),tag(FLEXs,'FLEX'),tag(SFLEXs,'SFLEX'),tag(DSTs,'DST'));
  var usedNames={};
  lineup.forEach(function(p){usedNames[p.name]=true;});
  var bench=pool.filter(function(p){return!usedNames[p.name];});
  return{lineup:lineup,bench:bench};
}

// ── ROSTER ───────────────────────────────────────────────────────────────────
function renderRoster(){
  var active=D.active.filter(function(p){return!p.taxi;});
  var taxi=D.active.filter(function(p){return p.taxi;});
  var lb=buildLineup(active);
  var lineup=lb.lineup;
  var bench=lb.bench;
  var total=lineup.reduce(function(s,p){return s+p.pp;},0);

  var rows='';
  lineup.forEach(function(p){
    rows+='<div class="p-row">' +
      '<span class="pos-badge pos-'+p.slot+'">'+p.slot+'</span>' +
      '<div style="flex:1">' +
        '<div class="p-name">'+p.name+'</div>' +
        '<div class="p-meta">'+p.pos+' · DV '+dv(p.name).toLocaleString()+'</div>' +
        (note(p.name)?'<div class="p-note">'+note(p.name)+'</div>':'') +
      '</div>' +
      '<div class="p-pts">'+p.pp.toFixed(1)+'</div>' +
    '</div>';
  });

  var brows='';
  bench.forEach(function(p){
    brows+='<div class="p-row">' +
      '<span class="pos-badge pos-'+p.pos+'">'+p.pos+'</span>' +
      '<div style="flex:1">' +
        '<div class="p-name">'+p.name+'</div>' +
        '<div class="p-meta" style="color:var(--sub)">'+p.pos+' · DV '+dv(p.name).toLocaleString()+'</div>' +
        (note(p.name)?'<div class="p-note" style="color:var(--sub)">'+note(p.name)+'</div>':'') +
      '</div>' +
      '<div style="font-size:12px;color:var(--sub)">'+p.pp.toFixed(1)+'</div>' +
    '</div>';
  });
  if(!brows)brows='<div class="p-row" style="color:var(--sub)">No bench players</div>';

  var trows='';
  taxi.forEach(function(p){
    trows+='<div class="p-row">' +
      '<span class="pos-badge pos-'+p.pos+'">'+p.pos+'</span>' +
      '<div style="flex:1">' +
        '<div class="p-name">'+p.name+' <span class="badge badge-taxi">TAXI</span></div>' +
        '<div class="p-meta" style="color:var(--sub)">'+(note(p.name)||'Taxi squad · developing')+'</div>' +

function renderContracts(){
  var inv=D.inventory||{};
  var alloc=D.allocations||{};
  var deadline=D.deadline;
  var daysLeft=Math.max(0,Math.ceil((new Date(deadline)-new Date())/(1000*60*60*24)));
  var yr=curYr();

  var slotDefs=[
    {type:'4yr',label:'4-Year'},{type:'3yr',label:'3-Year'},
    {type:'2yr',label:'2-Year'},{type:'1yr',label:'1-Year'},
    {type:'xfer',label:'Transfer'},
  ];
  var chips='';
  slotDefs.forEach(function(s){
    var total=inv[s.type]||0;
    var used=alloc[s.type]||0;
    for(var i=0;i<total;i++){
      var isUsed=i<used;
      chips+='<span class="chip '+(isUsed?'chip-used':'chip-avail')+'">'+s.label+' '+(isUsed?'✓ Used':'Available')+'</span>';
    }
  });

  var slotSec=makeSec('Available Contract Slots',
    'Slots you can assign this season. Green = available to use. Gray = already assigned. Assign before the deadline.',
    '<div class="slot-card">' +
      '<div style="margin-bottom:8px">'+chips+'</div>' +
      '<div style="font-size:12px;color:var(--warn)">⏰ Deadline: '+deadline+' &nbsp;·&nbsp; '+daysLeft+' days left</div>' +
    '</div>');

  // Expiring this year
  var expiring=D.active.filter(function(p){return(p.expiry||yr)<=yr&&!p.taxi;});
  expiring.sort(function(a,b){return dv(b.name)-dv(a.name);});
  var erows='';
  expiring.forEach(function(p){
    var v=dv(p.name);
    var rec=v>=4000;
    var slot=v>=7000?'3yr':v>=5500?'2yr':'1yr';
    erows+='<div class="p-row">' +
      '<span class="pos-badge pos-'+p.pos+'">'+p.pos+'</span>' +
      '<div style="flex:1">' +
        '<div class="p-name">'+p.name+'</div>' +
        '<div class="p-meta">Expires '+p.expiry+' · DV '+v.toLocaleString()+'</div>' +
        '<div class="p-meta" style="margin-top:4px">'+(rec
          ?'<span style="color:var(--ok)">→ Offer '+slot+' contract</span>'
          :'<span style="color:var(--danger)">→ Let expire (low value)</span>')+'</div>' +
        (note(p.name)?'<div class="p-note">'+note(p.name)+'</div>':'') +
      '</div>' +
    '</div>';
  });
  if(!erows)erows='<div class="p-row" style="color:var(--sub)">No expiring contracts this year</div>';

  var expSec=makeSec('Expiring Contracts — Act Now',
    'Players whose contracts run out this season. Offer extensions to the valuable ones before the deadline. Low-value players can be let go to free up slots.',
    erows);

  // Locked
  var locked=D.active.filter(function(p){return(p.expiry||yr)>yr;});
  var lrows='';
  locked.forEach(function(p){
    var rem=(p.expiry||yr)-yr;
    lrows+='<div class="p-row">' +
      '<span class="pos-badge pos-'+p.pos+'">'+p.pos+'</span>' +
      '<div style="flex:1">' +
        '<div class="p-name">'+p.name+'</div>' +
        '<div class="p-meta">Through '+p.expiry+' · '+rem+' yr'+(rem!==1?'s':'')+' remaining</div>' +
      '</div>' +
      '<div style="font-size:12px;color:var(--ok);font-weight:700">LOCKED</div>' +
    '</div>';
  });
  if(!lrows)lrows='<div class="p-row" style="color:var(--sub)">No multi-year contracts active</div>';

  var lockSec=makeSec('Active Multi-Year Contracts','Players locked in for multiple seasons. No action needed — just manage around them.',lrows);

  document.getElementById('contracts-body').innerHTML=slotSec+expSec+lockSec;
}

function renderDraft(){
  var rosterMap={};

  var needIdx=function(pos){return TEAM_NEEDS.indexOf(pos);};
  var scored=faPool.map(function(p){
    var ni=needIdx(p.pos);
    var needScore=ni<0?0:(TEAM_NEEDS.length-ni)*20;
    return Object.assign({},p,{score:needScore+dv(p.name)/100+proj(p.name)*2,v:dv(p.name),pp:proj(p.name)});
  }).sort(function(a,b){return b.score-a.score;});

  function needLabel(pos){
    var i=needIdx(pos);
    if(i===0)return'<span class="need-badge need-high">HIGH NEED</span>';
    if(i<=2)return'<span class="need-badge need-mid">MED NEED</span>';
    return'<span class="need-badge need-low">DEPTH</span>';
  }

  var rows='';

    rows+='<div class="p-row">' +
      '<span class="rank">'+(i+1)+'</span>' +
      '<span class="pos-badge pos-'+p.pos+'">'+p.pos+'</span>' +

        '<div class="p-name">'+p.name+' '+needLabel(p.pos)+'</div>' +

    'Ranked by: team positional need ('+TEAM_NEEDS.join(' › ')+') + dynasty value + PPR projection<br>' +

    '<span style="color:var(--warn)">MED</span> = good add · ' +
    '<span style="color:var(--ok)">DEPTH</span> = optional' +

function tradeMode(mode,el){
  document.querySelectorAll('.inner-tab').forEach(function(t){t.classList.remove('on');});
  el.classList.add('on');
  document.getElementById('trade-incoming').style.display=mode==='incoming'?'':'none';
  document.getElementById('trade-outgoing').style.display=mode==='outgoing'?'':'none';
}

function parseNames(str){
  return str.split(/[,\n]+/).map(function(s){return s.trim();}).filter(Boolean);
}

function scoreAssets(names){
  return names.reduce(function(s,n){
    var key=Object.keys(DV).find(function(k){return k.toLowerCase()===n.toLowerCase();});
    return s+(key?DV[key]:(n.toLowerCase().includes('1st')?6500:n.toLowerCase().includes('2nd')?4000:4500));
  },0);
}

function analyzeTrade(){
  var receive=parseNames(document.getElementById('t-receive').value);
  var give=parseNames(document.getElementById('t-give').value);
  if(!receive.length||!give.length){
    document.getElementById('trade-result').innerHTML='<div class="analysis" style="color:var(--warn)">Fill in both sides first.</div>';
    return;
  }
  var recVal=scoreAssets(receive);
  var giveVal=scoreAssets(give);
  var ratio=recVal/(giveVal||1);
  var needHit=receive.filter(function(n){
    var found=D.needs.find(function(p){return p.name.toLowerCase()===n.toLowerCase();});
    return found&&TEAM_NEEDS.slice(0,3).indexOf(found.pos)>-1;
  }).length;

  var verdict,vClass,advice;
  if(ratio>=1.15&&needHit>0){verdict='✅ ACCEPT';vClass='verdict-ok';advice='Good value and fills a positional need. Pull the trigger.';}
  else if(ratio>=1.0&&needHit>0){verdict='✅ LEAN ACCEPT';vClass='verdict-ok';advice='Fair deal that upgrades your roster. Worth doing.';}
  else if(ratio>=1.0){verdict='🤔 NEUTRAL';vClass='verdict-maybe';advice='Fair value but doesn\'t fill a need. Only do it if you\'re reshuffling.';}
  else if(ratio>=0.85){verdict='⚠️ LEAN DECLINE';vClass='verdict-maybe';advice='You\'re giving up more than you get. Counter with adjustments.';}
  else{verdict='❌ DECLINE';vClass='verdict-no';advice='Bad value for your side. The other team wins this clearly.';}

  var rList=receive.map(function(n){
    var key=Object.keys(DV).find(function(k){return k.toLowerCase()===n.toLowerCase();})||n;
    return '<div>'+key+' · <span style="color:var(--acc2)">DV '+(DV[key]||4500).toLocaleString()+'</span></div>';
  }).join('');
  var gList=give.map(function(n){
    var key=Object.keys(DV).find(function(k){return k.toLowerCase()===n.toLowerCase();})||n;
    return '<div>'+key+' · <span style="color:var(--danger)">DV '+(DV[key]||4500).toLocaleString()+'</span></div>';
  }).join('');

  document.getElementById('trade-result').innerHTML='<div class="analysis">' +
    '<div class="verdict '+vClass+'">'+verdict+'</div>' +
    '<div style="margin-bottom:10px">'+advice+'</div>' +
    '<div style="display:flex;gap:12px;margin-bottom:10px">' +
      '<div style="flex:1"><div style="font-size:11px;color:var(--ok);font-weight:700;margin-bottom:4px">YOU GET ('+recVal.toLocaleString()+')</div>'+rList+'</div>' +
      '<div style="flex:1"><div style="font-size:11px;color:var(--danger);font-weight:700;margin-bottom:4px">YOU GIVE ('+giveVal.toLocaleString()+')</div>'+gList+'</div>' +
    '</div>' +
    '<div style="font-size:12px;color:var(--sub)">Value ratio: '+(ratio*100).toFixed(0)+'% · Need fit: '+(needHit>0?'✓ Addresses a need':'No positional upgrade')+'</div>' +
  '</div>';
}

function analyzeOffer(){
  var want=parseNames(document.getElementById('o-want').value);
  var offer=parseNames(document.getElementById('o-offer').value);
  var reason=document.getElementById('o-reason').value;
  if(!want.length||!offer.length){
    document.getElementById('offer-result').innerHTML='<div class="analysis" style="color:var(--warn)">Fill in both sides first.</div>';
    return;
  }
  var wantVal=scoreAssets(want);
  var offerVal=scoreAssets(offer);
  var ratio=offerVal/(wantVal||1);
  var needHit=want.filter(function(n){
    var found=D.needs.find(function(p){return p.name.toLowerCase()===n.toLowerCase();});
    return found&&TEAM_NEEDS.slice(0,3).indexOf(found.pos)>-1;
  }).length;

  var you,them;
  if(ratio>=1.1){you='You\'re paying slightly above market — they\'ll probably accept.';them='Great deal for them — above market value.';}
  else if(ratio>=0.9){you='Fair offer. Reasonable chance they accept.';them='Fair for them too — balanced deal.';}
  else if(ratio>=0.75){you='Under-offering slightly — expect a counter.';them='They\'re giving up more value. May decline.';}
  else{you='Low-ball offer — likely rejected.';them='They\'d be losing this trade badly.';}

  var wList=want.map(function(n){var k=Object.keys(DV).find(function(x){return x.toLowerCase()===n.toLowerCase();})||n;return '<div>'+k+' · DV '+(DV[k]||4500).toLocaleString()+'</div>';}).join('');
  var oList=offer.map(function(n){var k=Object.keys(DV).find(function(x){return x.toLowerCase()===n.toLowerCase();})||n;return '<div>'+k+' · DV '+(DV[k]||4500).toLocaleString()+'</div>';}).join('');

  document.getElementById('offer-result').innerHTML='<div class="analysis">' +
    '<div style="font-size:13px;font-weight:700;color:var(--acc2);margin-bottom:8px">Offer Analysis</div>' +
    '<div style="display:flex;gap:12px;margin-bottom:12px">' +
      '<div style="flex:1"><div style="font-size:11px;color:var(--ok);font-weight:700;margin-bottom:4px">TARGET ('+(wantVal.toLocaleString())+')</div>'+wList+'</div>' +
      '<div style="flex:1"><div style="font-size:11px;color:var(--warn);font-weight:700;margin-bottom:4px">OFFER ('+(offerVal.toLocaleString())+')</div>'+oList+'</div>' +
    '</div>' +
    '<div style="margin-bottom:6px"><b>For you:</b> '+(needHit>0?'✓ Fills a positional need. ':'')+you+'</div>' +
    '<div style="margin-bottom:6px"><b>For them:</b> '+them+'</div>' +
    (reason?'<div style="font-size:12px;color:var(--sub);margin-top:6px">Your rationale: '+reason+'</div>':'')+
    '<div style="font-size:12px;color:var(--sub);margin-top:8px">Your offer = '+(ratio*100).toFixed(0)+'% of target value</div>' +
  '</div>';
}

function askRule(q){
  var ql=q.toLowerCase();
  if(/contract|slot|year|amount|same.*every.*year|how many|deadline/.test(ql)){
    var inv=D.inventory||{};
    var slots=Object.entries(inv).map(function(e){return e[1]+'x '+e[0];}).join(', ');
    var days=Math.max(0,Math.ceil((new Date(D.deadline)-new Date())/(1000*60*60*24)));
    var t='Your contract slots this season: <b>'+slots+'</b>.<br>Deadline: <b>'+D.deadline+'</b> ('+days+' days away).';
    if(/same.*every.*year|do i have/.test(ql)){
      t+='<br><br>In most dynasty leagues, you get a set of contract slots each year but the mix (how many 1yr vs 3yr etc.) can vary by league rules. Check your Sleeper league settings under the commissioner tab to confirm your exact setup.';
    }
    return{t:t,links:['contracts']};
  }
  if(/start|sit|lineup|who should i (play|start)/.test(ql)){
    var active=D.active.filter(function(p){return!p.taxi;});
    var lb=buildLineup(active);
    var names=lb.lineup.map(function(p){return p.slot+': <b>'+p.name+'</b> ('+proj(p.name).toFixed(1)+' proj)';}).join('<br>');
    return{t:'Optimal lineup this week:<br><br>'+names+'<br><br>Keep an eye on Rashee Rice — still working back from the ACL. If he\'s questionable, consider your FLEX depth.',links:['scoring']};
  }
  if(/waiver|free agent|pickup|add|who (should i|to) (add|pick|pick up)/.test(ql)){
    var fa=D.needs.filter(function(p){return!D.active.find(function(a){return a.name===p.name;});});
    var top=fa.sort(function(a,b){return dv(b.name)-dv(a.name);}).slice(0,3);
    var list=top.map(function(p){return '<b>'+p.name+'</b> ('+p.pos+') — '+(note(p.name)||'solid add');}).join('<br>');
    return{t:'Top pickups for your squad right now:<br><br>'+list+'<br><br>TE is your biggest hole — David Njoku or Tucker Kraft would be immediate starters.',links:['waivers']};
  }
  if(/hole|weak|need|biggest.*gap|position|where am i weak/.test(ql)){
    return{t:'Your biggest weaknesses:<br><br>1. <b>TE</b> — zero on active roster. David Njoku and Tucker Kraft are priority targets.<br>2. <b>RB depth</b> — Pacheco is solid but thin after him. Kaleb Johnson is a must-add.<br>3. <b>DST</b> — nothing rostered. Dallas Cowboys are available and score consistently.<br><br>WR is deep though — that\'s a strength you can trade from.',links:['strategy']};
  }
  if(/rookie|draft.*pick|2025 class|2026 draft/.test(ql)){
    var rookies=D.active.filter(function(p){return p.taxi||(p.expiry||2026)<=2027;});
    var rnames=rookies.map(function(p){return'<b>'+p.name+'</b>';}).join(', ');
    return{t:'Your young/developing players: '+rnames+'.<br><br>In dynasty, patience pays off. Hold for 2-3 seasons before cutting. Cam Ward and Kaleb Johnson (FAs) have the highest upside in this class — prioritize adding them.',links:['rookie']};
  }
  if(/trade|value|worth|who.*tradeable|who should i trade/.test(ql)){
    return{t:'Your best trade assets: Joe Burrow (DV 8,800), Rashee Rice (8,600), Devonta Smith (6,800). Those are elite — only move them for equal or better value.<br><br>Kaelon Black, Chris Bell, Skyler Bell are depth pieces you could package to fill your TE or RB needs. Use the Trade tab for specific deal analysis.',links:['strategy']};
  }
  if(/scoring|ppr|point.*per.*reception|how.*scored/.test(ql)){
    return{t:'Your league is PPR — 1 point per reception. That boosts slot receivers and pass-catching RBs significantly.<br><br>Big winners in PPR: Devonta Smith, Terry McLaurin, Desmond Reid. In PPR, volume and target share matter more than TD-dependent scoring. Always prioritize high-catch-rate guys.',links:['scoring']};
  }
  if(/dynasty|beginner|how does.*work|explain/.test(ql)){
    return{t:'Dynasty = you keep your players year over year. The goal is building a team that competes for multiple years, not just one season.<br><br>Your team is actually in good shape — Burrow and Rice are elite dynasty assets, and you have a solid young core. Focus on filling the TE hole and adding depth RBs.',links:['strategy','contracts']};
  }
  return null;
}

function renderAsk(){
  var qqs=QUICK_QS.map(function(q){return'<button class="qq" onclick="sendAsk(\''+q.replace(/'/g,"\\'")+'\')">'+ q+'</button>';}).join('');
  var html='<div class="ask-wrap">' +
    '<div class="quick-qs">'+qqs+'</div>' +
    '<div class="ask-msgs" id="ask-msgs">' +
      '<div class="msg msg-a"><div class="bubble">Hey! Ask me anything about your team — lineups, contracts, trades, strategy, or just dynasty in general. I\'ll keep it real 🏈</div></div>' +
    '</div>' +
    '<div class="ask-bar">' +
      '<input type="text" id="ask-input" placeholder="Ask anything…" onkeydown="if(event.key===\'Enter\')sendAsk()">' +
      '<button onclick="sendAsk()"><svg viewBox="0 0 24 24" style="fill:white;width:18px;height:18px"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg></button>' +
    '</div>' +
  '</div>';
  document.getElementById('ask-body').innerHTML=html;
}

function sendAsk(override){
  var inp=document.getElementById('ask-input');
  var msgs=document.getElementById('ask-msgs');
  var q=override||(inp?inp.value.trim():'');
  if(!q)return;
  if(inp)inp.value='';
  msgs.innerHTML+='<div class="msg msg-u"><div class="bubble">'+q+'</div></div>';
  var lid='load'+Date.now();
  msgs.innerHTML+='<div class="msg msg-a" id="'+lid+'"><div class="bubble"><div class="loading"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div></div>';
  msgs.scrollTop=msgs.scrollHeight;

  var cfg=ldCfg();
  if(cfg.groqKey){
    groqAsk(q,cfg.groqKey,function(resp){
      var el=document.getElementById(lid);
      if(el)el.innerHTML='<div class="bubble">'+resp+'</div>';
      msgs.scrollTop=msgs.scrollHeight;
    });
    return;
  }

  // Rule-based fallback
  setTimeout(function(){
    var ruled=askRule(q);
    var el=document.getElementById(lid);
    if(!el)return;
    if(ruled){
      el.innerHTML='<div class="bubble">'+ruled.t+linkBlock(ruled.links||[])+'</div>';
    } else {
      el.innerHTML='<div class="bubble">Not sure on that specific one, but here are some solid resources:'+linkBlock(['strategy','contracts','scoring'])+'<br><br>Try asking about your lineup, contracts, roster holes, free agents, trades, or rookies.</div>';
    }
    msgs.scrollTop=msgs.scrollHeight;
  },400);
}

function groqAsk(q,apiKey,cb){
  var ctx='Roster: '+D.active.map(function(p){return p.name+'('+p.pos+',exp'+p.expiry+')';}).join(', ')+
    '. Contract inventory: '+Object.entries(D.inventory||{}).map(function(e){return e[1]+'x'+e[0];}).join(', ')+
    '. Deadline: '+D.deadline+'. Biggest needs: '+TEAM_NEEDS.join(', ')+'.';
  var sys='You are Dynasty HQ, a casual dynasty fantasy football advisor. User team context: '+ctx+' Keep responses under 200 words. Be direct, informal, use player names. No fluff.';
  fetch('https://api.groq.com/openai/v1/chat/completions',{
    method:'POST',
    headers:{'Authorization':'Bearer '+apiKey,'Content-Type':'application/json'},
    body:JSON.stringify({model:'llama-3.3-70b-versatile',messages:[{role:'system',content:sys},{role:'user',content:q}],max_tokens:300,stream:false})
  }).then(function(r){return r.json();}).then(function(data){
    cb(data.choices&&data.choices[0]?data.choices[0].message.content:'Could not get AI response.');
  }).catch(function(){cb('AI unavailable right now. Check your API key in settings.');});
}

// ── INIT ──────────────────────────────────────────────────────────────────────
renderRoster();
renderAsk();

document.addEventListener('click',function(e){
  if(!e.target.closest('.sec-hd')){
    document.querySelectorAll('.sec-hd.tip-open').forEach(function(el){el.classList.remove('tip-open');});
  }
});
</script>
