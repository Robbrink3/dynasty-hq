<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Dynasty HQ">
<title>Dynasty HQ</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0d1117;--sur:#161b22;--bdr:#30363d;--acc:#58a6ff;
  --grn:#3fb950;--red:#f85149;--ylw:#d29922;--pur:#bc8cff;
  --txt:#e6edf3;--mut:#8b949e;--r:8px;
}
body{background:var(--bg);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;line-height:1.5;height:100dvh;display:flex;flex-direction:column;overflow:hidden}
#hdr{height:52px;background:var(--sur);border-bottom:1px solid var(--bdr);display:flex;align-items:center;padding:0 14px;flex-shrink:0}
#hdr h1{font-size:17px;font-weight:700}
#body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:calc(60px + env(safe-area-inset-bottom))}
#tabs{height:60px;background:var(--sur);border-top:1px solid var(--bdr);display:flex;position:fixed;bottom:0;left:0;right:0;padding-bottom:env(safe-area-inset-bottom)}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;cursor:pointer;color:var(--mut);font-size:9px;font-weight:600;padding:4px 2px}
.tab.on{color:var(--acc)}
.tab .ico{font-size:20px;line-height:1}
.pg{display:none;padding:12px}
.pg.on{display:block}
.card{background:var(--sur);border:1px solid var(--bdr);border-radius:var(--r);margin-bottom:10px;overflow:hidden}
.ch{padding:10px 12px;border-bottom:1px solid var(--bdr);font-size:13px;font-weight:700}
.row{display:flex;align-items:center;gap:8px;padding:8px 12px;border-bottom:1px solid var(--bdr)}
.row:last-child{border-bottom:none}
.nm{flex:1;font-size:13px;font-weight:500}
.sm{font-size:11px;color:var(--mut)}
.val{font-size:12px;font-weight:700;color:var(--acc)}
.b{font-size:10px;padding:2px 6px;border-radius:4px;font-weight:700}
.bQB{background:#1c2a3a;color:#79c0ff}
.bRB{background:#1a2d1a;color:#56d364}
.bWR{background:#2d1f3a;color:#bc8cff}
.bTE{background:#2d2210;color:#ffa657}
.bDST{background:#1f2d2d;color:#39d353}
.bK{background:#2a2a1a;color:#d4c96c}
.bPick{background:#252525;color:#ccc}
.bTAXI{background:#1c2a3a;color:var(--acc);font-size:9px}
.bg{background:#1a2d1a;color:var(--grn)}
.by{background:#2d2410;color:var(--ylw)}
.br{background:#2d1a1a;color:var(--red)}
.sec{font-size:10px;font-weight:700;color:var(--mut);text-transform:uppercase;letter-spacing:.5px;padding:8px 12px 4px}
.stat-g{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.stat{background:var(--sur);border:1px solid var(--bdr);border-radius:var(--r);padding:10px 12px}
.stat .lbl{font-size:10px;color:var(--mut);text-transform:uppercase;letter-spacing:.4px}
.stat .num{font-size:24px;font-weight:800;color:var(--acc);line-height:1.2}
.stat .sub{font-size:11px;color:var(--mut)}
btn,button{background:var(--acc);color:#000;border:none;border-radius:var(--r);font-size:14px;font-weight:700;padding:11px 16px;cursor:pointer;width:100%;display:block;margin-bottom:10px}
button:active{opacity:.8}
button.sec2{background:var(--sur);color:var(--txt);border:1px solid var(--bdr)}
button.sm2{font-size:12px;padding:7px 12px;width:auto;display:inline-block;margin-bottom:0}
.rec{background:var(--sur);border:1px solid var(--grn);border-radius:var(--r);padding:12px;margin-bottom:10px}
.rec h3{font-size:13px;font-weight:700;color:var(--grn);margin-bottom:8px}
.rec p,.rec li{font-size:13px;color:var(--txt);line-height:1.6}
.rec ul{padding-left:16px}
.rec .hint{font-size:11px;color:var(--mut);margin-top:6px}
.warn{border-color:var(--ylw)}
.warn h3{color:var(--ylw)}
.err{border-color:var(--red)}
.err h3{color:var(--red)}
.prog{height:6px;background:var(--bdr);border-radius:3px;overflow:hidden;margin-top:4px}
.prog-fill{height:100%;background:var(--acc);border-radius:3px}
.deadline{background:#2d2410;border:1px solid var(--ylw);border-radius:var(--r);padding:10px 12px;margin-bottom:10px}
.deadline strong{display:block;font-size:14px;color:var(--ylw)}
.deadline span{font-size:12px;color:var(--mut)}
input,select,textarea{background:var(--sur);border:1px solid var(--bdr);border-radius:var(--r);color:var(--txt);font-size:14px;padding:9px 11px;width:100%;outline:none;margin-bottom:8px}
input:focus,select:focus{border-color:var(--acc)}
.trade-wrap{display:flex;gap:8px;margin-bottom:10px}
.trade-side{flex:1;background:var(--sur);border:1px solid var(--bdr);border-radius:var(--r);padding:10px}
.trade-side h4{font-size:11px;font-weight:700;color:var(--mut);text-transform:uppercase;margin-bottom:8px}
.trade-item{display:flex;align-items:center;gap:6px;padding:3px 0;font-size:13px}
.xbtn{background:none;border:none;color:var(--red);font-size:18px;line-height:1;cursor:pointer;width:20px;flex-shrink:0;margin-bottom:0;padding:0}
.verdict{text-align:center;padding:12px;border-radius:var(--r);font-weight:700;font-size:14px;margin-bottom:10px}
.v-win{background:#1a2d1a;color:var(--grn);border:1px solid var(--grn)}
.v-lose{background:#2d1a1a;color:var(--red);border:1px solid var(--red)}
.v-fair{background:#2d2410;color:var(--ylw);border:1px solid var(--ylw)}
.srch-results{background:var(--sur);border:1px solid var(--acc);border-radius:var(--r);max-height:180px;overflow-y:auto;margin-bottom:8px}
.srch-row{display:flex;align-items:center;gap:8px;padding:8px 12px;border-bottom:1px solid var(--bdr);cursor:pointer}
.srch-row:last-child{border-bottom:none}
.srch-row:active{background:var(--bdr)}
/* Ask tab */
#ask-wrap{display:flex;flex-direction:column;height:calc(100dvh - 52px - 60px)}
#ask-msgs{flex:1;overflow-y:auto;padding:12px;-webkit-overflow-scrolling:touch}
#ask-foot{padding:10px 12px;background:var(--bg);border-top:1px solid var(--bdr);flex-shrink:0}
#ask-quick{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
#ask-row{display:flex;gap:8px}
#ask-row input{flex:1;margin-bottom:0}
#ask-row button{width:auto;margin-bottom:0;padding:9px 16px}
.msg{margin-bottom:10px}
.msg.me{text-align:right}
.bub{display:inline-block;padding:8px 12px;border-radius:12px;font-size:13px;line-height:1.5;max-width:88%;text-align:left}
.me .bub{background:var(--acc);color:#000;border-radius:12px 12px 3px 12px}
.ai .bub{background:var(--sur);border:1px solid var(--bdr);border-radius:12px 12px 12px 3px}
.lnk-list{margin-top:6px;display:flex;flex-direction:column;gap:5px}
.lnk{background:var(--bg);border:1px solid var(--bdr);border-radius:6px;padding:7px 10px;font-size:12px;color:var(--acc);text-decoration:none;display:block}
.alloc-sel{width:80px;font-size:12px;padding:5px 6px;margin-bottom:0;flex-shrink:0}
.empty{text-align:center;color:var(--mut);padding:28px 16px;font-size:13px}
</style>
</head>
<body>
<div id="hdr"><h1>🏈 Dynasty HQ</h1></div>
<div id="body">

<!-- ROSTER -->
<div id="pg-roster" class="pg on">
  <div class="stat-g" id="r-stats"></div>
  <div id="r-list"></div>
</div>

<!-- CONTRACTS -->
<div id="pg-contracts" class="pg">
  <div id="c-deadline"></div>
  <button onclick="recContracts()">🎯 Recommend Slot Assignments</button>
  <div id="c-rec" style="display:none"></div>
  <div id="c-slots"></div>
  <div id="c-list"></div>
  <div style="margin-top:4px;display:flex;gap:8px">
    <button class="sm2 sec2" onclick="exportLD()">Export</button>
    <button class="sm2 sec2" onclick="importLD()">Import</button>
  </div>
</div>

<!-- WEEK -->
<div id="pg-week" class="pg">
  <button onclick="recWeek()">🎯 Get Week Recommendations</button>
  <div id="w-rec" style="display:none"></div>
  <div id="w-list"></div>
</div>

<!-- DRAFT -->
<div id="pg-draft" class="pg">
  <button onclick="recDraft()">🎯 Get Draft Recommendations</button>
  <div id="d-rec" style="display:none"></div>
  <div id="d-list"></div>
</div>

<!-- TRADE -->
<div id="pg-trade" class="pg">
  <button onclick="recTrade()">🎯 Recommend a Trade</button>
  <div id="t-rec" style="display:none"></div>
  <div class="trade-wrap">
    <div class="trade-side">
      <h4>You Give</h4>
      <div id="give-list"></div>
      <input id="give-q" placeholder="Search player / pick..." oninput="srch('give',this.value)" autocomplete="off">
      <div id="give-res" class="srch-results" style="display:none"></div>
    </div>
    <div class="trade-side">
      <h4>You Get</h4>
      <div id="get-list"></div>
      <input id="get-q" placeholder="Search player / pick..." oninput="srch('get',this.value)" autocomplete="off">
      <div id="get-res" class="srch-results" style="display:none"></div>
    </div>
  </div>
  <div id="t-verdict"></div>
  <button class="sec2" onclick="clearTrade()">Clear Trade</button>
</div>

<!-- ASK -->
<div id="pg-ask" class="pg" style="padding:0">
  <div id="ask-wrap">
    <div id="ask-msgs"></div>
    <div id="ask-foot">
      <div id="ask-quick">
        <button class="sm2 sec2" onclick="qa('Who should I start this week?')">Start/Sit</button>
        <button class="sm2 sec2" onclick="qa('Best free agent pickup?')">FA Pickup</button>
        <button class="sm2 sec2" onclick="qa('Rookie to target?')">Rookie</button>
        <button class="sm2 sec2" onclick="qa('Roster overview')">Roster</button>
      </div>
      <div id="ask-row">
        <input id="ask-q" placeholder="Ask anything dynasty..." onkeydown="if(event.key==='Enter')ask()">
        <button onclick="ask()">Send</button>
      </div>
      <div style="margin-top:6px;display:flex;gap:6px;align-items:center">
        <span class="sm">AI:</span>
        <select id="ai-sel" style="width:auto;font-size:12px;padding:4px 6px;margin-bottom:0" onchange="onAI()">
          <option value="rule">Built-in (free)</option>
          <option value="groq">Groq (free key)</option>
        </select>
        <input id="ai-key" placeholder="Groq API key..." style="display:none;font-size:12px;padding:4px 6px;margin-bottom:0" oninput="saveKey()">
      </div>
    </div>
  </div>
</div>

</div><!-- end #body -->

<div id="tabs">
  <div class="tab on" id="t-roster" onclick="go('roster')"><span class="ico">👥</span>Roster</div>
  <div class="tab" id="t-contracts" onclick="go('contracts')"><span class="ico">📝</span>Contracts</div>
  <div class="tab" id="t-week" onclick="go('week')"><span class="ico">📅</span>Week</div>
  <div class="tab" id="t-draft" onclick="go('draft')"><span class="ico">📋</span>Draft</div>
  <div class="tab" id="t-trade" onclick="go('trade')"><span class="ico">🔄</span>Trade</div>
  <div class="tab" id="t-ask" onclick="go('ask')"><span class="ico">🤖</span>Ask</div>
</div>

<script>
// ─── DATA ────────────────────────────────────────────────────────────────────
const SEED={
  active:[
    {name:'Rashee Rice',    pos:'WR',years:3,expiry:2028,taxi:false},
    {name:'Joe Burrow',     pos:'QB',years:1,expiry:2026,taxi:false},
    {name:'Devonta Smith',  pos:'WR',years:1,expiry:2026,taxi:false},
    {name:'Isiah Pacheco',  pos:'RB',years:1,expiry:2026,taxi:false},
    {name:'Jaylin Noel',    pos:'WR',years:1,expiry:2026,taxi:true},
    {name:'Terry McLaurin', pos:'WR',years:1,expiry:2026,taxi:false},
    {name:'Chris Bell',     pos:'WR',years:1,expiry:2026,taxi:false},
    {name:'Desmond Reid',   pos:'RB',years:1,expiry:2026,taxi:false},
    {name:'Skyler Bell',    pos:'WR',years:1,expiry:2026,taxi:false},
    {name:'Kaytron Allen',  pos:'RB',years:1,expiry:2026,taxi:false},
    {name:'Kaelon Black',   pos:'RB',years:1,expiry:2026,taxi:false},
    {name:'Drew Allar',     pos:'QB',years:1,expiry:2026,taxi:false},
    {name:'Isaac Tesla',    pos:'WR',years:1,expiry:2026,taxi:true},
  ],
  needs:[
    {name:'Christian Watson',pos:'WR'},{name:'David Njoku',    pos:'TE'},
    {name:'Cam Ward',        pos:'QB'},{name:'Kaleb Johnson',  pos:'RB'},
    {name:'Tre Harris',      pos:'WR'},{name:'Rashid Shaheed', pos:'WR'},
    {name:'Tucker Kraft',    pos:'TE'},{name:'Juwan Johnson',  pos:'TE'},
    {name:'Theo Johnson',    pos:'TE'},{name:'Darius Slayton', pos:'WR'},
    {name:'Kendrick Bourne', pos:'WR'},{name:'Keenan Allen',   pos:'WR'},
    {name:'Tre Tucker',      pos:'WR'},{name:'Devin Singletary',pos:'RB'},
    {name:'Dallas Cowboys',  pos:'DST'},{name:'Cade Otton',   pos:'TE'},
    {name:'Parker Washington',pos:'WR'},{name:'Tyler Algier', pos:'RB'},
  ],
  inventory:{'4yr':1,'3yr':1,'2yr':3,'1yr':1,'xfer':1},
  allocations:{},
  deadline:'2026-06-29'
};

// Dynasty values (KTC-style 0–10000)
const DV={
  'Patrick Mahomes':9800,'Josh Allen':9600,'Lamar Jackson':9500,'Joe Burrow':8800,
  'Jalen Hurts':8600,'Jayden Daniels':8400,'Jordan Love':8200,'Caleb Williams':8000,
  'Bo Nix':7500,'Cam Ward':7000,'Drew Allar':5500,
  'Christian McCaffrey':8500,'Breece Hall':8800,'Bijan Robinson':9000,
  'Jahmyr Gibbs':9200,"De'Von Achane":8600,'Jonathan Taylor':7800,
  'Isiah Pacheco':6800,'Kyren Williams':7200,'Kaytron Allen':6000,
  'Kaelon Black':4800,'Desmond Reid':4500,'Kaleb Johnson':6500,'Tyler Algier':4500,
  'Justin Jefferson':9500,'CeeDee Lamb':9400,"Ja'Marr Chase":9600,
  'Amon-Ra St. Brown':8800,'Puka Nacua':8000,'Rashee Rice':8600,
  'Devonta Smith':6800,'Terry McLaurin':5800,'Jaylin Noel':5800,
  'Chris Bell':4200,'Skyler Bell':4800,'Isaac Tesla':4500,
  'Tre Harris':6200,'Rashid Shaheed':5500,'Darius Slayton':4200,
  'Kendrick Bourne':3200,'Keenan Allen':3500,'Tre Tucker':4500,
  'Parker Washington':4800,'Christian Watson':5500,
  'Sam LaPorta':7500,'Trey McBride':8200,'David Njoku':5500,
  'Tucker Kraft':5800,'Juwan Johnson':4000,'Theo Johnson':4200,'Cade Otton':3800,
  'Dallas Cowboys':2500,'Devin Singletary':3800,
  '2025 1st':7000,'2025 2nd':4500,'2025 3rd':2500,
  '2026 1st':6500,'2026 2nd':4000,'2026 3rd':2000,
  '2027 1st':6000,'2027 2nd':3500,'2027 3rd':2000,
};

function dv(name){
  if(!name)return 0;
  const k=Object.keys(DV).find(k=>k.toLowerCase()===name.toLowerCase().trim());
  if(k)return DV[k];
  const lc=name.toLowerCase();
  const f=Object.keys(DV).find(k=>lc.includes(k.split(' ').pop().toLowerCase())&&lc.includes(k.split(' ')[0].toLowerCase()));
  return f?DV[f]:0;
}
function tier(v){
  if(v>=8000)return{cls:'bg',t:'Elite'};
  if(v>=6000)return{cls:'bg',t:'Star'};
  if(v>=4000)return{cls:'by',t:'Starter'};
  if(v>=2000)return{cls:'by',t:'Depth'};
  return{cls:'br',t:'Low'};
}
function nn(s){return(s||'').toLowerCase().replace(/[^a-z]/g,'')}

// ─── STORAGE ─────────────────────────────────────────────────────────────────
function ld(k,d=''){try{const v=localStorage.getItem(k);return v!==null?v:d}catch{return d}}
function sv(k,v){try{localStorage.setItem(k,v)}catch{}}
function ldD(){try{const v=localStorage.getItem('dhq');return v?JSON.parse(v):JSON.parse(JSON.stringify(SEED))}catch{return JSON.parse(JSON.stringify(SEED))}}
function svD(d){try{localStorage.setItem('dhq',JSON.stringify(d))}catch{}}

// ─── STATE ────────────────────────────────────────────────────────────────────
let D=ldD();
let give=[],get2=[];

// ─── INIT ─────────────────────────────────────────────────────────────────────
(function(){
  if(!localStorage.getItem('dhq'))svD(SEED);
  D=ldD();
  renderRoster();
  renderContracts();
  renderWeekList();
  renderDraftList();
  const prov=ld('dhq_prov','rule');
  document.getElementById('ai-sel').value=prov;
  const key=ld('dhq_key','');
  if(key)document.getElementById('ai-key').value=key;
  onAI();
  if(!ld('dhq_hi','')){
    addMsg('ai','👋 Ask me anything — start/sit, trade values, rookie targets, or strategy. Tap the quick buttons above or type your own question.');
    sv('dhq_hi','1');
  }
})();

// ─── NAV ──────────────────────────────────────────────────────────────────────
function go(t){
  document.querySelectorAll('.pg').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));
  document.getElementById('pg-'+t).classList.add('on');
  document.getElementById('t-'+t).classList.add('on');
}

// ─── ROSTER ──────────────────────────────────────────────────────────────────
function renderRoster(){
  const a=D.active||[];
  const yr=new Date().getFullYear();
  const total=a.reduce((s,c)=>s+dv(c.name),0);
  const exp=a.filter(c=>c.expiry<=yr+1).length;
  const taxi=a.filter(c=>c.taxi).length;
  document.getElementById('r-stats').innerHTML=`
    <div class="stat"><div class="lbl">Total Value</div><div class="num">${(total/1000).toFixed(1)}k</div><div class="sub">dynasty pts</div></div>
    <div class="stat"><div class="lbl">Contracts</div><div class="num">${a.length}</div><div class="sub">active</div></div>
    <div class="stat"><div class="lbl">Expiring</div><div class="num">${exp}</div><div class="sub">by ${yr+1}</div></div>
    <div class="stat"><div class="lbl">Taxi</div><div class="num">${taxi}</div><div class="sub">squad</div></div>`;
  const grps={};
  a.forEach(c=>{const p=c.pos||'?';if(!grps[p])grps[p]=[];grps[p].push(c);});
  const order=['QB','RB','WR','TE','DST','K','?'];
  let h='';
  order.forEach(pos=>{
    if(!grps[pos])return;
    grps[pos].sort((a,b)=>dv(b.name)-dv(a.name));
    h+=`<div class="sec">${pos}</div><div class="card">`;
    grps[pos].forEach(c=>{
      const v=dv(c.name); const ti=tier(v);
      h+=`<div class="row">
        <span class="b b${pos}">${pos}</span>
        <div class="nm">${c.name}${c.taxi?'&nbsp;<span class="b bTAXI">TAXI</span>':''}</div>
        <span class="sm">${c.years}yr·${c.expiry}</span>
        <span class="b ${ti.cls}" style="margin-left:4px">${ti.t}</span>
        <span class="val" style="margin-left:6px">${v||'—'}</span>
      </div>`;
    });
    h+='</div>';
  });
  // needs section
  const n=D.needs||[];
  if(n.length){
    h+=`<div class="sec">Targets / Needs</div><div class="card">`;
    n.forEach(c=>{
      const v=dv(c.name); const ti=tier(v);
      h+=`<div class="row">
        <span class="b b${c.pos||'?'}">${c.pos||'?'}</span>
        <div class="nm">${c.name}</div>
        ${v?`<span class="b ${ti.cls}">${ti.t}</span><span class="val" style="margin-left:6px">${v}</span>`:''}
      </div>`;
    });
    h+='</div>';
  }
  document.getElementById('r-list').innerHTML=h;
}

// ─── CONTRACTS ───────────────────────────────────────────────────────────────
function renderContracts(){
  const yr=new Date().getFullYear();
  // deadline
  let dh='';
  if(D.deadline){
    const days=Math.ceil((new Date(D.deadline)-Date.now())/86400000);
    dh=`<div class="deadline"><strong>⏰ Contract Deadline: ${D.deadline}</strong><span>${days>0?days+' days remaining':'DEADLINE PASSED'}</span></div>`;
  }
  document.getElementById('c-deadline').innerHTML=dh;
  // slot progress
  const inv=D.inventory||{};
  const alloc=D.allocations||{};
  const used={};
  Object.values(alloc).forEach(v=>{if(v&&v!=='—')used[v]=(used[v]||0)+1;});
  let sh=`<div class="card">`;
  Object.keys(inv).forEach(k=>{
    const u=used[k]||0; const t=inv[k]||0; const pct=t?Math.round(u/t*100):0;
    sh+=`<div style="padding:8px 12px;border-bottom:1px solid var(--bdr)">
      <div style="display:flex;justify-content:space-between;margin-bottom:3px">
        <span style="font-weight:700;font-size:13px">${k} slots</span>
        <span class="sm">${u}/${t} used · ${t-u} left</span>
      </div>
      <div class="prog"><div class="prog-fill" style="width:${pct}%"></div></div>
    </div>`;
  });
  sh+='</div>';
  document.getElementById('c-slots').innerHTML=sh;
  // player list with dropdown
  const slots=['4yr','3yr','2yr','1yr','xfer','—'];
  let ch=`<div class="sec">Active Contracts</div><div class="card">`;
  (D.active||[]).forEach(c=>{
    const cur=alloc[nn(c.name)]||'—';
    ch+=`<div class="row">
      <span class="b b${c.pos}">${c.pos}</span>
      <div class="nm">${c.name}${c.taxi?'&nbsp;<span class="b bTAXI">TAXI</span>':''}</div>
      <span class="sm">${c.years}yr·${c.expiry}</span>
      <select class="alloc-sel" onchange="setAlloc('${nn(c.name)}',this.value)">
        ${slots.map(s=>`<option${cur===s?' selected':''}>${s}</option>`).join('')}
      </select>

  });

  document.getElementById('c-list').innerHTML=ch;

function setAlloc(key,val){
  if(!D.allocations)D.allocations={};
  if(val==='—')delete D.allocations[key];
  else D.allocations[key]=val;
  svD(D); renderContracts();
}

function recContracts(){
  const inv=D.inventory||{};
  const alloc=D.allocations||{};
  const used={};
  Object.values(alloc).forEach(v=>{if(v&&v!=='—')used[v]=(used[v]||0)+1;});
  const avail={};
  Object.keys(inv).forEach(k=>avail[k]=Math.max(0,(inv[k]||0)-(used[k]||0)));

  // Score players not yet assigned
  const unassigned=(D.active||[]).filter(c=>!alloc[nn(c.name)]||alloc[nn(c.name)]==='—')
    .map(c=>({...c,v:dv(c.name)})).sort((a,b)=>b.v-a.v);

  const recs=[];
  const tmp={...avail};
  const slotOrder=['4yr','3yr','2yr','1yr','xfer'];

  unassigned.forEach(c=>{
    for(const s of slotOrder){
      if((tmp[s]||0)>0){
        tmp[s]--;
        const why=c.v>=8000?'elite value — lock in long':c.v>=6000?'high value — multi-year':c.v>=4000?'solid starter':'depth piece — short term ok';
        recs.push(`<li><strong>${c.name}</strong> → <span style="color:var(--ylw)">${s}</span> <span class="sm">(${why})</span></li>`);
        break;
      }
    }
  });

  // already assigned summary
  const done=Object.entries(alloc).filter(([,v])=>v&&v!=='—');
  let h=`<div class="rec">
    <h3>🎯 Contract Slot Recommendations</h3>`;
  if(recs.length){
    h+=`<p style="margin-bottom:6px">Assign these slots based on dynasty value:</p><ul>${recs.join('')}</ul>`;
  } else {
    h+=`<p>✅ All players already have slot assignments!</p>`;
  }
  if(done.length){
    h+=`<p class="hint">Already assigned: ${done.map(([k,v])=>`${k}→${v}`).join(', ')}</p>`;
  }
  const leftover=Object.entries(tmp).filter(([,v])=>v>0).map(([k,v])=>`${v}× ${k}`).join(', ');
  if(leftover) h+=`<p class="hint">Remaining open slots: ${leftover}</p>`;
  h+=`<p class="hint">⚠️ Deadline: ${D.deadline} — ${Math.ceil((new Date(D.deadline)-Date.now())/86400000)} days left</p>`;
  h+='</div>';
  show('c-rec',h);
}

}

function recDraft(){
  const needs=D.needs||[];

  active.forEach(c=>{if(!byPos[c.pos])byPos[c.pos]=[];byPos[c.pos].push({...c,v:dv(c.name)});});

  ['TE','RB','QB','WR','DST'].forEach(pos=>{

function srch(side,q){
  q=q.trim();
  const resId=side==='give'?'give-res':'get-res';
  const el=document.getElementById(resId);
  if(q.length<2){el.style.display='none';return;}
  const matches=[];
  // picks
  ['2025','2026','2027'].forEach(y=>['1st','2nd','3rd'].forEach(r=>{
    const lbl=`${y} ${r}`;
    if(lbl.toLowerCase().includes(q.toLowerCase())) matches.push({name:lbl,pos:'Pick',v:dv(lbl)});
  }));
  // players from DV + active contracts
  const seen=new Set();
  Object.keys(DV).forEach(k=>{
    if(k.toLowerCase().includes(q.toLowerCase())&&!seen.has(k)){seen.add(k);matches.push({name:k,pos:'?',v:DV[k]});}
  });
  (D.active||[]).concat(D.needs||[]).forEach(c=>{
    if(c.name.toLowerCase().includes(q.toLowerCase())&&!seen.has(c.name)){seen.add(c.name);matches.push({name:c.name,pos:c.pos,v:dv(c.name)});}
  });
  matches.sort((a,b)=>b.v-a.v);
  if(!matches.length){el.style.display='none';return;}
  el.style.display='block';
  el.innerHTML=matches.slice(0,12).map(m=>`
    <div class="srch-row" onclick="addTrade('${side}','${m.name.replace(/'/g,"\\'")}','${m.pos}',${m.v})">
      <span class="b b${m.pos}">${m.pos}</span>
      <span style="flex:1;font-size:13px">${m.name}</span>
      <span class="val">${m.v||'?'}</span>
    </div>`).join('');
}

function addTrade(side,name,pos,v){
  const arr=side==='give'?give:get2;
  if(!arr.find(i=>i.name===name))arr.push({name,pos,v:+v});
  document.getElementById(side==='give'?'give-q':'get-q').value='';
  document.getElementById(side==='give'?'give-res':'get-res').style.display='none';
  renderTrade();
}
function removeTrade(side,i){(side==='give'?give:get2).splice(i,1);renderTrade();}

function renderTrade(){
  ['give','get'].forEach(side=>{
    const arr=side==='give'?give:get2;
    document.getElementById(side+'-list').innerHTML=arr.map((it,i)=>`
      <div class="trade-item">
        <button class="xbtn" onclick="removeTrade('${side}',${i})">×</button>
        <span class="b b${it.pos}">${it.pos}</span>
        <span style="flex:1">${it.name}</span>
        <span class="val">${it.v||'?'}</span>
      </div>`).join('');
  });
  const gTotal=give.reduce((s,i)=>s+i.v,0);
  const rTotal=get2.reduce((s,i)=>s+i.v,0);
  const el=document.getElementById('t-verdict');
  if(!give.length&&!get2.length){el.innerHTML='';return;}
  const diff=rTotal-gTotal;
  const pct=gTotal?Math.abs(Math.round(diff/gTotal*100)):100;
  let cls,msg;
  if(diff>1000){cls='v-win';msg=`✅ You WIN (+${diff} value, +${pct}%)`;}
  else if(diff<-1000){cls='v-lose';msg=`❌ You LOSE (${diff} value, -${pct}%)`;}
  else{cls='v-fair';msg=`⚖️ Fair trade (diff: ${diff>0?'+':''}${diff})`;}
  el.innerHTML=`<div class="verdict ${cls}">${msg}<br><span style="font-size:12px;font-weight:400">Give: ${gTotal} · Get: ${rTotal}</span></div>`;
}

function clearTrade(){give=[];get2=[];renderTrade();document.getElementById('t-verdict').innerHTML='';}

function recTrade(){
  const active=D.active||[];
  const needs=D.needs||[];
  const yr=new Date().getFullYear();

  // Best trade candidates to give away: expiring + high value = sell high
  const sell=active.filter(c=>{
    const v=dv(c.name); const exp=(c.expiry||yr)-yr;
    return v>=4000&&exp<=1&&!['Rashee Rice','Joe Burrow'].includes(c.name);
  }).sort((a,b)=>dv(b.name)-dv(a.name));

  // Never trade: cornerstones
  const keep=active.filter(c=>dv(c.name)>=8000||(c.years||1)>=3).sort((a,b)=>dv(b.name)-dv(a.name));

  // Best targets by need + value
  const targets=needs.map(n=>({...n,v:dv(n.name)})).sort((a,b)=>b.v-a.v).slice(0,5);

  let h=`<div class="rec">
    <h3>🎯 Trade Recommendations</h3>

    <p><strong style="color:var(--red)">📤 Sell / Trade Away (expiring or surplus):</strong></p>
    ${sell.length?`<ul>${sell.slice(0,4).map(c=>`<li><strong>${c.name}</strong> (${c.pos}, val: ${dv(c.name)}) — expires ${c.expiry}, sell before value drops</li>`).join('')}</ul>`
    :`<p>No obvious sell candidates right now.</p>`}

    <p style="margin-top:8px"><strong style="color:var(--grn)">🔒 Do NOT Trade (untouchable):</strong></p>
    <ul>${keep.slice(0,3).map(c=>`<li><strong>${c.name}</strong> (${c.pos}, val: ${dv(c.name)}) — cornerstone, hold</li>`).join('')||'<li>None identified</li>'}</ul>

    <p style="margin-top:8px"><strong style="color:var(--acc)">📥 Target in Trades (your needs):</strong></p>
    <ul>${targets.map(n=>`<li><strong>${n.name}</strong> (${n.pos}, val: ${n.v||'?'}) — listed team need</li>`).join('')||'<li>No needs listed</li>'}</ul>

    <p class="hint">Use the Trade Calculator above to evaluate any specific offer. A fair trade is within ±1000 value points.</p>
  </div>`;
  show('t-rec',h);
}

}

function qa(q){document.getElementById('ask-q').value=q;ask();}

async function ask(){
  const inp=document.getElementById('ask-q');
  const q=inp.value.trim(); if(!q)return;
  inp.value='';
  addMsg('me',q);
  const prov=document.getElementById('ai-sel').value;
  const loadEl=addMsg('ai','<span style="color:var(--mut)">Thinking...</span>');
  try{
    if(prov==='groq'){
      const key=ld('dhq_key','');
      if(!key){loadEl.remove();addMsg('ai','Enter your Groq API key in the settings row below.');return;}
      await groqAsk(q,loadEl);
    } else {
      await new Promise(r=>setTimeout(r,300));
      const {t,k}=ruleAnswer(q);
      loadEl.remove();
      addMsg('ai',t,LINKS[k]||[]);
    }
  }catch(e){
    loadEl.remove();
    const {t,k}=ruleAnswer(q);
    addMsg('ai',t,LINKS[k]||[]);
  }
}

async function groqAsk(q,loadEl){
  const key=ld('dhq_key','');
  const ctx=`Active contracts: ${(D.active||[]).map(c=>c.name+'('+c.pos+',exp '+c.expiry+')').join(', ')}. Needs: ${(D.needs||[]).map(n=>n.name+'('+n.pos+')').join(', ')}.`;
  const res=await fetch('https://api.groq.com/openai/v1/chat/completions',{
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':'Bearer '+key},
    body:JSON.stringify({
      model:'llama-3.3-70b-versatile',
      messages:[
        {role:'system',content:`You are a dynasty fantasy football assistant. Be concise and direct. Team context: ${ctx}`},
        {role:'user',content:q}
      ],
      stream:true,max_tokens:600
    })
  });
  if(!res.ok){const t=await res.text();throw new Error(t);}
  loadEl.remove();
  const msgEl=addMsg('ai','');
  const bub=msgEl.querySelector('.bub');
  let full='';
  const reader=res.body.getReader(); const dec=new TextDecoder();
  while(true){
    const{done,value}=await reader.read(); if(done)break;
    dec.decode(value).split('\n').forEach(line=>{
      if(!line.startsWith('data:'))return;
      const d=line.slice(5).trim(); if(d==='[DONE]')return;
      try{const j=JSON.parse(d);full+=j.choices?.[0]?.delta?.content||'';bub.innerHTML=full.replace(/\n/g,'<br>');}catch{}
    });
    bub.scrollIntoView({behavior:'smooth'});
  }
}

function onAI(){
  const p=document.getElementById('ai-sel').value; sv('dhq_prov',p);
  document.getElementById('ai-key').style.display=p==='rule'?'none':'block';
}
function saveKey(){sv('dhq_key',document.getElementById('ai-key').value);}

// ─── UTIL ─────────────────────────────────────────────────────────────────────
function show(id,html){const el=document.getElementById(id);el.style.display='block';el.innerHTML=html;el.scrollIntoView({behavior:'smooth'});}
</script>
